<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta property="og:title" content="你最看不見自己的哪一面？">
  <meta property="og:description" content="10 題壓力情境測驗，找出你在壓力下啟動的認知功能影子">
  <meta property="og:image" content="https://mori1024studio.github.io/mbti-shadow-quiz/og.png">
  <title>你最看不見自己的哪一面？｜MBTI 壓力影子測驗</title>
  <!-- v1.0 | 2026-06-19 | 初始版本：MBTI 壓力影子測驗，4 種影子類型，T1 類型卡片揭示 -->

  <style>
    /* ── CSS 01：字型與基礎變數 ── */
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

    :root {
      --bg: #0A0A0F;
      --card: #14141F;
      --opt: #1C1C2A;
      --opt-hover: #24243A;
      --gold: #C4A96A;
      --gold-b: #E8C86A;
      --text: #E8E8F0;
      --text-2: #A0A0B8;
      --radius-card: 18px;
      --radius-btn: 100px;
      --type-color: #C4A96A;
      --type-glow: rgba(196,169,106,0.3);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans TC', sans-serif;
      min-height: 100dvh;
      overflow-x: hidden;
      cursor: none;
    }

    /* ── CSS 02：自訂游標 ── */
    .cursor-dot {
      position: fixed; width: 8px; height: 8px;
      background: var(--gold); border-radius: 50%;
      pointer-events: none; z-index: 9999;
      transform: translate(-50%,-50%);
      transition: transform .1s;
    }
    .cursor-ring {
      position: fixed; width: 32px; height: 32px;
      border: 1px solid rgba(196,169,106,.4); border-radius: 50%;
      pointer-events: none; z-index: 9998;
      transform: translate(-50%,-50%);
      transition: transform .15s, width .2s, height .2s, opacity .2s;
    }
    .cursor-spotlight {
      position: fixed; width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(196,169,106,.04) 0%, transparent 70%);
      border-radius: 50%; pointer-events: none; z-index: 1;
      transform: translate(-50%,-50%);
    }

    /* ── CSS 03：粒子背景 ── */
    #particles-js { position: fixed; inset: 0; z-index: 0; }

    /* ── CSS 04：光暈 blobs ── */
    .mori-blobs { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .mori-blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: .08; }
    .blob-1 { width:500px; height:500px; background:#1A3A6A; top:-100px; left:-100px; animation: blobFloat 20s ease-in-out infinite; }
    .blob-2 { width:400px; height:400px; background:#4A1A6A; bottom:-80px; right:-80px; animation: blobFloat 25s ease-in-out infinite reverse; }
    .blob-3 { width:300px; height:300px; background:#6A3A1A; top:40%; left:40%; animation: blobFloat 18s ease-in-out infinite 5s; }
    @keyframes blobFloat {
      0%,100% { transform: translate(0,0) scale(1); }
      33% { transform: translate(30px,-20px) scale(1.05); }
      66% { transform: translate(-20px,30px) scale(.95); }
    }

    /* ── CSS 05：畫面容器 ── */
    .screen {
      display: none; flex-direction: column; align-items: center;
      min-height: 100dvh; padding: 24px 20px 48px;
      position: relative; z-index: 10;
    }
    .screen.active { display: flex; }
    .screen.active > * { animation: fadeInUp .5s ease both; }
    @keyframes fadeInUp {
      from { opacity:0; transform:translateY(20px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ── CSS 06：歡迎頁 ── */
    .welcome-wrap {
      max-width: 480px; width: 100%;
      display: flex; flex-direction: column; align-items: center;
      padding-top: 48px;
    }
    .welcome-tag {
      font-size: 11px; letter-spacing: .2em; color: var(--gold);
      text-transform: uppercase; margin-bottom: 20px;
      border: 1px solid rgba(196,169,106,.3); padding: 4px 14px; border-radius: 100px;
    }
    .welcome-title {
      font-size: clamp(28px,7vw,40px); font-weight: 900; text-align: center;
      line-height: 1.25; margin-bottom: 8px;
      background: linear-gradient(135deg,#fff 30%,#C4A96A 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .welcome-subtitle {
      font-size: 14px; color: var(--text-2); text-align: center;
      margin-bottom: 32px; line-height: 1.6;
    }
    .welcome-desc {
      background: var(--card); border-radius: var(--radius-card);
      padding: 24px; width: 100%; margin-bottom: 28px;
      border: 1px solid rgba(255,255,255,.06);
    }
    .welcome-desc p { font-size: 14px; line-height: 1.8; color: var(--text-2); }
    .welcome-desc strong { color: var(--text); }
    .welcome-stats { display: flex; gap: 16px; width: 100%; margin-bottom: 32px; }
    .stat-item {
      flex: 1; background: var(--card); border-radius: 12px;
      padding: 16px 12px; text-align: center;
      border: 1px solid rgba(255,255,255,.06);
    }
    .stat-num { font-size: 22px; font-weight: 900; color: var(--gold); display: block; }
    .stat-label { font-size: 11px; color: var(--text-2); margin-top: 4px; }

    /* ── CSS 07：符號選擇 ── */
    .sym-section { width: 100%; max-width: 480px; margin-bottom: 28px; }
    .sym-label { font-size: 12px; color: var(--text-2); text-align: center; margin-bottom: 12px; letter-spacing: .1em; }
    .sym-grid { display: flex; gap: 10px; justify-content: center; }
    .sym-item {
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--card); border: 1px solid rgba(255,255,255,.08);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; cursor: pointer; transition: all .2s;
    }
    .sym-item:hover, .sym-item.active {
      border-color: var(--gold); background: rgba(196,169,106,.1); transform: scale(1.1);
    }

    /* ── CSS 08：按鈕 ── */
    .btn-primary {
      background: linear-gradient(135deg,#C4A96A,#E8C86A);
      color: #0A0A0F; font-weight: 900; font-size: 15px;
      padding: 16px 40px; border-radius: var(--radius-btn);
      border: none; cursor: pointer; width: 100%; max-width: 320px;
      transition: all .2s; letter-spacing: .05em;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(196,169,106,.3); }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    /* ── CSS 09：測驗題目 ── */
    .quiz-wrap { max-width: 540px; width: 100%; }
    .quiz-progress-bar {
      width: 100%; height: 3px; background: rgba(255,255,255,.08);
      border-radius: 100px; margin-bottom: 32px; overflow: hidden;
    }
    .quiz-progress-fill {
      height: 100%; background: linear-gradient(90deg,#C4A96A,#E8C86A);
      border-radius: 100px; transition: width .4s ease;
    }
    .quiz-counter { font-size: 12px; color: var(--text-2); letter-spacing: .1em; text-align: center; margin-bottom: 20px; }
    .quiz-q {
      font-size: clamp(17px,4vw,20px); font-weight: 700;
      line-height: 1.5; text-align: center; margin-bottom: 28px; min-height: 60px;
    }
    .quiz-opts { display: flex; flex-direction: column; gap: 10px; }
    .quiz-opt {
      background: var(--opt); border: 1px solid rgba(255,255,255,.06);
      border-radius: 14px; padding: 16px 20px; cursor: pointer;
      font-size: 14px; line-height: 1.6; color: var(--text);
      transition: all .2s; text-align: left;
    }
    .quiz-opt:hover { background: var(--opt-hover); border-color: rgba(196,169,106,.3); }
    .quiz-opt.selected { background: rgba(196,169,106,.12); border-color: var(--gold); }
    .quiz-opt.disabled { pointer-events: none; opacity: .6; }

    /* ── CSS 10：計算過渡頁 ── */
    .calc-wrap { max-width: 360px; width: 100%; text-align: center; padding-top: 80px; }
    .calc-ring {
      width: 80px; height: 80px; border-radius: 50%;
      border: 2px solid rgba(196,169,106,.2); border-top-color: var(--gold);
      animation: spin 1s linear infinite; margin: 0 auto 32px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .calc-msg { font-size: 16px; color: var(--text-2); min-height: 28px; transition: opacity .2s; }

    /* ── CSS 11：問卷解鎖 ── */
    .survey-wrap { max-width: 480px; width: 100%; }
    .survey-title { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 8px; }
    .survey-sub { font-size: 13px; color: var(--text-2); text-align: center; margin-bottom: 32px; line-height: 1.6; }
    .survey-step {
      background: var(--card); border-radius: var(--radius-card); padding: 24px;
      border: 1px solid rgba(255,255,255,.06); margin-bottom: 16px;
    }
    .survey-q-label { font-size: 11px; color: var(--gold); letter-spacing: .15em; margin-bottom: 12px; }
    .survey-q-text { font-size: 15px; font-weight: 500; margin-bottom: 16px; line-height: 1.5; }
    .survey-opts { display: flex; flex-direction: column; gap: 8px; }
    .survey-opt {
      background: var(--opt); border: 1px solid rgba(255,255,255,.06);
      border-radius: 10px; padding: 12px 16px; cursor: pointer;
      font-size: 13px; color: var(--text-2); transition: all .2s;
    }
    .survey-opt:hover, .survey-opt.selected {
      background: rgba(196,169,106,.1); border-color: var(--gold); color: var(--text);
    }
    .survey-unlock-btn {
      margin-top: 24px; width: 100%; padding: 16px;
      background: linear-gradient(135deg,#C4A96A,#E8C86A);
      color: #0A0A0F; font-weight: 900; font-size: 15px;
      border-radius: var(--radius-btn); border: none; cursor: pointer;
      transition: all .2s; letter-spacing: .05em;
    }
    .survey-unlock-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(196,169,106,.3); }
    .survey-unlock-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    /* ── CSS 12：T1 類型揭示動畫 ── */
    .type-reveal-overlay {
      position: fixed; inset: 0; z-index: 200;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg); opacity: 0; pointer-events: none;
      transition: opacity .4s;
    }
    .type-reveal-overlay.active { opacity: 1; pointer-events: all; }
    .type-reveal-inner { text-align: center; padding: 24px; }
    .type-reveal-emoji {
      font-size: 72px; display: block; margin-bottom: 20px;
      animation: emojiPop .7s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes emojiPop {
      0% { transform: scale(0); opacity: 0; }
      60% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }
    .type-reveal-label {
      font-size: 12px; letter-spacing: .25em; color: var(--text-2);
      text-transform: uppercase; margin-bottom: 12px;
      animation: fadeUp .5s .3s both;
    }
    .type-reveal-name {
      font-size: clamp(32px,8vw,56px); font-weight: 900;
      line-height: 1.1; margin-bottom: 16px;
      animation: fadeUp .5s .45s both;
    }
    .type-reveal-tag {
      font-size: 15px; color: var(--text-2); max-width: 320px; line-height: 1.7;
      animation: fadeUp .5s .6s both;
    }
    .type-reveal-bar {
      width: 48px; height: 2px; border-radius: 100px; margin: 20px auto;
      animation: fadeUp .5s .35s both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── CSS 13：結果頁 ── */
    .result-wrap { max-width: 540px; width: 100%; }
    .result-type-header {
      text-align: center; padding: 36px 24px 28px; margin-bottom: 16px;
      background: var(--card); border-radius: var(--radius-card);
      border: 1px solid rgba(255,255,255,.06);
      position: relative; overflow: hidden;
      animation: fadeInUp .6s ease both;
    }
    .result-type-glow {
      position: absolute; width: 320px; height: 320px; border-radius: 50%;
      top: -120px; left: 50%; transform: translateX(-50%);
      filter: blur(60px); opacity: .12;
      background: var(--type-color);
    }
    .result-emoji { font-size: 52px; display: block; margin-bottom: 14px; position: relative; }
    .result-badge {
      display: inline-block; font-size: 11px; letter-spacing: .15em;
      color: var(--type-color); border: 1px solid var(--type-color);
      padding: 3px 12px; border-radius: 100px; margin-bottom: 14px;
      text-transform: uppercase; position: relative;
    }
    .result-name {
      font-size: clamp(26px,6vw,36px); font-weight: 900; line-height: 1.2;
      position: relative; margin-bottom: 12px;
    }
    .result-tagline {
      font-size: 14px; color: var(--text-2); line-height: 1.7;
      position: relative; max-width: 380px; margin: 0 auto;
    }
    .result-card {
      background: var(--card); border-radius: var(--radius-card); padding: 24px;
      border: 1px solid rgba(255,255,255,.06); margin-bottom: 14px;
      animation: fadeInUp .6s ease both;
    }
    .result-card h3 {
      font-size: 11px; letter-spacing: .18em; color: var(--gold);
      text-transform: uppercase; margin-bottom: 14px;
    }
    .result-card p { font-size: 14px; line-height: 1.85; color: var(--text-2); }
    .result-source {
      font-size: 12px; color: rgba(160,160,184,.45); line-height: 1.6;
      padding-top: 12px; margin-top: 12px;
      border-top: 1px solid rgba(255,255,255,.06); font-style: italic;
    }
    .analysis-grid { display: flex; flex-direction: column; gap: 12px; margin-bottom: 14px; }
    .analysis-item {
      background: var(--card); border-radius: 14px; padding: 18px 20px;
      border: 1px solid rgba(255,255,255,.06);
      animation: fadeInUp .6s ease both;
    }
    .analysis-num { font-size: 10px; color: var(--type-color); font-weight: 700; letter-spacing: .12em; margin-bottom: 8px; }
    .analysis-item p { font-size: 14px; line-height: 1.75; color: var(--text-2); }
    .mori-card {
      background: linear-gradient(135deg,rgba(196,169,106,.05),rgba(232,200,106,.02));
      border-radius: var(--radius-card); padding: 24px;
      border: 1px solid rgba(196,169,106,.2); margin-bottom: 16px;
      animation: fadeInUp .6s ease both;
    }
    .mori-card h3 { font-size: 11px; letter-spacing: .18em; color: var(--gold); text-transform: uppercase; margin-bottom: 14px; }
    .mori-card p { font-size: 14px; line-height: 1.85; color: var(--text); }

    /* ── CSS 14：Email 收集 ── */
    .email-section {
      background: var(--card); border-radius: var(--radius-card); padding: 24px;
      border: 1px solid rgba(255,255,255,.06); margin-bottom: 16px;
      animation: fadeInUp .6s ease both;
    }
    .email-section h3 { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
    .email-section p { font-size: 13px; color: var(--text-2); margin-bottom: 16px; line-height: 1.6; }
    .email-row { display: flex; gap: 8px; }
    .email-input {
      flex: 1; background: var(--opt); border: 1px solid rgba(255,255,255,.1);
      border-radius: 10px; padding: 12px 16px; color: var(--text); font-size: 14px;
      outline: none; transition: border-color .2s; font-family: inherit;
    }
    .email-input:focus { border-color: var(--gold); }
    .email-input::placeholder { color: rgba(160,160,184,.5); }
    .email-submit {
      background: var(--gold); color: #0A0A0F; font-weight: 700; font-size: 13px;
      padding: 12px 20px; border-radius: 10px; border: none; cursor: pointer;
      white-space: nowrap; transition: all .2s; font-family: inherit;
    }
    .email-submit:hover { background: var(--gold-b); }
    .email-ok { font-size: 13px; color: #7EC4A0; margin-top: 8px; display: none; }

    /* ── CSS 15：行動按鈕 ── */
    .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .action-btn {
      background: var(--card); border: 1px solid rgba(255,255,255,.08);
      border-radius: 14px; padding: 16px 12px; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      transition: all .2s; color: var(--text); font-size: 12px; font-family: inherit;
    }
    .action-btn:hover { border-color: var(--gold); transform: translateY(-2px); }
    .action-btn svg { width: 22px; height: 22px; }
    .action-btn-wide {
      grid-column: 1/-1; background: rgba(196,169,106,.08);
      border-color: rgba(196,169,106,.2); color: var(--gold);
    }
    .action-btn-wide:hover { background: rgba(196,169,106,.15); }
    .social-row { display: flex; gap: 12px; justify-content: center; margin-bottom: 20px; }
    .social-btn {
      display: flex; align-items: center; gap: 8px;
      background: var(--card); border: 1px solid rgba(255,255,255,.08);
      border-radius: 100px; padding: 10px 20px; cursor: pointer;
      font-size: 13px; color: var(--text-2); transition: all .2s; font-family: inherit;
    }
    .social-btn:hover { border-color: var(--gold); color: var(--gold); }
    .retake-link {
      text-align: center; font-size: 13px; color: var(--text-2);
      cursor: pointer; padding: 12px; transition: color .2s; margin-bottom: 16px;
    }
    .retake-link:hover { color: var(--gold); }

    /* hidden util */
    #share-canvas { display: none; }
    .pdf-target { display: none; }
  </style>
</head>
<body>

  <!-- cursor -->
  <div class="cursor-dot" id="cursorDot"></div>
  <div class="cursor-ring" id="cursorRing"></div>
  <div class="cursor-spotlight" id="cursorSpotlight"></div>

  <!-- background -->
  <div class="mori-blobs">
    <div class="mori-blob blob-1"></div>
    <div class="mori-blob blob-2"></div>
    <div class="mori-blob blob-3"></div>
  </div>
  <div id="particles-js"></div>

  <!-- T1 揭示 overlay -->
  <div class="type-reveal-overlay" id="typeRevealOverlay">
    <div class="type-reveal-inner">
      <span class="type-reveal-emoji" id="revealEmoji"></span>
      <div class="type-reveal-label">你的壓力影子功能是</div>
      <div class="type-reveal-bar" id="revealBar"></div>
      <div class="type-reveal-name" id="revealName"></div>
      <div class="type-reveal-tag" id="revealTag"></div>
    </div>
  </div>

  <!-- ── Screen 1：歡迎 ── -->
  <div class="screen active" id="screen-welcome">
    <div class="welcome-wrap">
      <div class="welcome-tag">MBTI 壓力影子測驗</div>
      <h1 class="welcome-title">你最看不見<br>自己的哪一面？</h1>
      <p class="welcome-subtitle">壓力讓我們都變成了另一個自己——你的影子是哪一種？</p>

      <div class="welcome-desc">
        <p>
          <strong>這不是測你是哪個 MBTI 類型。</strong><br><br>
          這是測你在壓力下，最難察覺卻最常控制你行為的那個<strong>認知影子功能</strong>。<br><br>
          每個人都有一個在崩潰時會浮現的影子——它不是你的強項，但在你最難受的時候，它就默默接管了你整個系統。
        </p>
      </div>

      <div class="welcome-stats">
        <div class="stat-item"><span class="stat-num">10</span><div class="stat-label">情境題</div></div>
        <div class="stat-item"><span class="stat-num">4</span><div class="stat-label">影子類型</div></div>
        <div class="stat-item"><span class="stat-num">3 min</span><div class="stat-label">完成時間</div></div>
      </div>

      <div class="sym-section">
        <div class="sym-label">選一個代表你今天狀態的符號</div>
        <div class="sym-grid">
          <div class="sym-item active" data-sym="🌊" onclick="pickSym(this)">🌊</div>
          <div class="sym-item" data-sym="🔩" onclick="pickSym(this)">🔩</div>
          <div class="sym-item" data-sym="🌀" onclick="pickSym(this)">🌀</div>
          <div class="sym-item" data-sym="🌿" onclick="pickSym(this)">🌿</div>
          <div class="sym-item" data-sym="✦" onclick="pickSym(this)">✦</div>
        </div>
      </div>

      <button class="btn-primary" id="startBtn" onclick="startQuiz()">開始測驗</button>
    </div>
  </div>

  <!-- ── Screen 2：測驗 ── -->
  <div class="screen" id="screen-quiz">
    <div class="quiz-wrap">
      <div class="quiz-progress-bar">
        <div class="quiz-progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="quiz-counter" id="quizCounter">01 / 10</div>
      <div class="quiz-q" id="quizQ"></div>
      <div class="quiz-opts" id="quizOpts"></div>
    </div>
  </div>

  <!-- ── Screen 3：計算 ── -->
  <div class="screen" id="screen-calc">
    <div class="calc-wrap">
      <div class="calc-ring"></div>
      <div class="calc-msg" id="calcMsg">分析認知模式中⋯</div>
    </div>
  </div>

  <!-- ── Screen 4：問卷解鎖 ── -->
  <div class="screen" id="screen-survey">
    <div class="survey-wrap">
      <h2 class="survey-title">再回答 3 個問題</h2>
      <p class="survey-sub">讓我更了解你的狀況，給你更精準的分析方向</p>
      <div id="surveySteps"></div>
      <button class="survey-unlock-btn" id="surveyBtn" onclick="revealResult()" disabled>

    document.querySelectorAll('.sym-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
    sym = el.dataset.sym;
  }

  function startQuiz() {
    showScreen('screen-quiz');
    renderQ();
    track('quiz_start');
  }

  /* ── JS 09：題目渲染 ── */
  function renderQ() {
    const q = QS[curQ];
    document.getElementById('progressFill').style.width = ((curQ / QS.length) * 100) + '%';
    document.getElementById('quizCounter').textContent = String(curQ + 1).padStart(2,'0') + ' / ' + QS.length;
    document.getElementById('quizQ').textContent = q.text;

    const optsEl = document.getElementById('quizOpts');
    optsEl.innerHTML = '';
    q.opts.forEach((opt, i) => {
      const el = document.createElement('button');
      el.className = 'quiz-opt';
      el.textContent = opt.txt;
      el.onclick = () => pickOpt(i);
      optsEl.appendChild(el);
    });
  }

  function pickOpt(i) {
    const opts = document.querySelectorAll('.quiz-opt');
    opts.forEach(o => o.classList.add('disabled'));
    opts[i].classList.add('selected');
    const q = QS[curQ];
    Object.entries(q.opts[i].scores).forEach(([k, v]) => { scores[k] += v; });
    setTimeout(nextQ, 440);
  }

  function nextQ() {
    curQ++;
    if (curQ >= QS.length) {
      doCalc();
    } else {
      const optsEl = document.getElementById('quizOpts');
      optsEl.style.opacity = '0';
      setTimeout(() => { renderQ(); optsEl.style.opacity = '1'; }, 160);
    }
  }

  /* ── JS 10：計算過渡 ── */
  function doCalc() {
    showScreen('screen-calc');
    const msgs = ['分析認知模式中⋯','識別壓力反應模式⋯','解析影子功能⋯','整合結果中⋯','即將完成⋯'];
    let idx = 0;
    const el = document.getElementById('calcMsg');
    const iv = setInterval(() => {
      el.style.opacity = '0';
      setTimeout(() => { el.textContent = msgs[idx++ % msgs.length]; el.style.opacity = '1'; }, 200);
    }, 800);
    setTimeout(() => {
      clearInterval(iv);
      resultType = Object.entries(scores).sort((a,b) => b[1]-a[1])[0][0];
      showSurvey();
    }, 2800);
  }

  /* ── JS 11：問卷解鎖 ── */
  function showSurvey() {
    showScreen('screen-survey');
    const wrap = document.getElementById('surveySteps');
    wrap.innerHTML = '';
    SURVEY_QS.forEach((q, qi) => {
      const step = document.createElement('div');
      step.className = 'survey-step';
      step.innerHTML = `
        <div class="survey-q-label">${q.label}</div>
        <div class="survey-q-text">${q.text}</div>
        <div class="survey-opts">
          ${q.opts.map((o, oi) => `<div class="survey-opt" onclick="pickSurvey(${qi},${oi},this)">${o}</div>`).join('')}
        </div>`;
      wrap.appendChild(step);
    });
  }

  function pickSurvey(qi, oi, el) {
    el.closest('.survey-step').querySelectorAll('.survey-opt').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
    surveyAnswers[qi] = oi;
    if (surveyAnswers.every(a => a !== null)) {
      document.getElementById('surveyBtn').disabled = false;
    }
  }

  /* ── JS 12：T1 揭示動畫 ── */
  function revealResult() {
    const t = TYPES[resultType];
    document.documentElement.style.setProperty('--type-color', t.color);
    document.documentElement.style.setProperty('--type-glow', t.color + '40');

    const overlay = document.getElementById('typeRevealOverlay');
    document.getElementById('revealEmoji').textContent = t.emoji;
    document.getElementById('revealBar').style.background = t.color;
    document.getElementById('revealName').textContent = t.name;
    document.getElementById('revealName').style.color = t.color;
    document.getElementById('revealTag').textContent = t.tagline;

    overlay.classList.add('active');
    track('result_reveal', { type: resultType });

    setTimeout(() => {
      overlay.classList.remove('active');
      showResult();
    }, 3400);
  }

  /* ── JS 13：結果頁渲染 ── */
  function showResult() {
    showScreen('screen-result');
    const t = TYPES[resultType];
    document.getElementById('resultContent').innerHTML = buildResultHTML(t);
    window.scrollTo(0, 0);
  }

      <div class="social-row">

  /* ── JS 14：Email 提交（本機預覽 MailerLite 無效）── */
  async function submitEmail() {
    const email = document.getElementById('emailInput').value.trim();
    if (!email || !email.includes('@')) return;
    document.getElementById('emailOk').style.display = 'block';
    document.getElementById('emailInput').disabled = true;
    document.querySelector('.email-submit').disabled = true;

    if (CFG.mlKey && CFG.mlGroup[resultType]) {
      try {
        await fetch('https://connect.mailerlite.com/api/subscribers', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${CFG.mlKey}` },
          body: JSON.stringify({ email, groups: [CFG.mlGroup[resultType]] })
        });
      } catch(e) {}
    }
    track('email_submit', { type: resultType });
  }

  /* ── JS 15：PDF 下載 ── */
  function downloadPDF() {
    const t = TYPES[resultType];
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });

    pdf.setFillColor(10,10,15); pdf.rect(0,0,210,297,'F');
    pdf.setTextColor(196,169,106); pdf.setFontSize(9);
    pdf.text('MBTI 壓力影子測驗 · mori1024studio.github.io/mbti-shadow-quiz', 105,18,{align:'center'});
    pdf.setTextColor(232,232,240); pdf.setFontSize(22);
    pdf.text(t.emoji + ' ' + t.name, 105, 40, {align:'center'});
    pdf.setFontSize(11); pdf.setTextColor(160,160,184);
    pdf.text(pdf.splitTextToSize(t.tagline, 160), 105, 52, {align:'center'});
    pdf.setTextColor(196,169,106); pdf.setFontSize(8); pdf.text('你的壓力影子', 25, 70);
    pdf.line(25,72,185,72);
    pdf.setTextColor(200,200,215); pdf.setFontSize(10);
    const descL = pdf.splitTextToSize(t.desc, 160); pdf.text(descL, 25, 78);
    let y = 78 + descL.length * 4.5 + 8;
    t.analysis.forEach((a,i) => {
      pdf.setTextColor(196,169,106); pdf.setFontSize(8); pdf.text('分析 0'+(i+1), 25, y); y+=5;
      pdf.setTextColor(200,200,215); pdf.setFontSize(10);
      const al = pdf.splitTextToSize(a, 160); pdf.text(al, 25, y); y += al.length*4.5+7;
    });
    pdf.setTextColor(196,169,106); pdf.setFontSize(8); pdf.text('Mori 觀點', 25, y); y+=5;
    pdf.setTextColor(220,210,190); pdf.setFontSize(10);
    pdf.text(pdf.splitTextToSize(t.moriView, 160), 25, y);
    pdf.save('MBTI壓力影子_' + t.name + '.pdf');
    track('pdf_download', { type: resultType });
  }

  /* ── JS 16：分享功能 ── */
  function shareResult() {
    const t = TYPES[resultType];
    const canvas = document.getElementById('share-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 600; canvas.height = 600;
    ctx.fillStyle = '#0A0A0F'; ctx.fillRect(0,0,600,600);
    const g = ctx.createRadialGradient(300,160,0,300,160,280);
    g.addColorStop(0, t.color+'28'); g.addColorStop(1,'transparent');
    ctx.fillStyle = g; ctx.fillRect(0,0,600,600);
    ctx.font = '68px serif'; ctx.textAlign = 'center';
    ctx.fillStyle = '#fff'; ctx.fillText(t.emoji, 300, 190);
    ctx.font = 'bold 30px sans-serif'; ctx.fillStyle = t.color;
    ctx.fillText(t.name, 300, 248);
    ctx.font = '15px sans-serif'; ctx.fillStyle = '#A0A0B8';
    wrapText(ctx, t.tagline, 300, 285, 480, 26);
    ctx.font = '11px sans-serif'; ctx.fillStyle = '#C4A96A';
    ctx.fillText('你最看不見自己的哪一面？', 300, 542);
    ctx.fillStyle = '#505068';
    ctx.fillText('mori1024studio.github.io/mbti-shadow-quiz', 300, 566);
    canvas.toBlob(blob => {
      if (navigator.share) {
        navigator.share({ title:'我的壓力影子：'+t.name, files:[new File([blob],'shadow.png',{type:'image/png'})] }).catch(()=>downloadCanvas(canvas));
      } else { downloadCanvas(canvas); }
    });
    track('share',{type:resultType});
  }

  function wrapText(ctx, text, x, y, maxW, lh) {
    const chars = text.split(''); let line='';
    for(let n=0;n<chars.length;n++){
      const test=line+chars[n];
      if(ctx.measureText(test).width>maxW&&n>0){ctx.fillText(line,x,y);line=chars[n];y+=lh;}
      else{line=test;}
    }
    ctx.fillText(line,x,y);
  }

  function downloadCanvas(c){ const a=document.createElement('a'); a.download='mbti-shadow.png'; a.href=c.toDataURL(); a.click(); }

  function copyResult() {
    const t = TYPES[resultType];
    const text = `我的 MBTI 壓力影子是「${t.name}」\n「${t.tagline}」\n\n你的呢？測驗：https://mori1024studio.github.io/mbti-shadow-quiz/`;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.action-btn-wide');
      const orig = btn.textContent; btn.textContent = '✓ 已複製！';
      setTimeout(()=>{ btn.textContent=orig; }, 2000);
    });
    track('copy',{type:resultType});
  }

  function openLine() {
    const url = encodeURIComponent('https://mori1024studio.github.io/mbti-shadow-quiz/');
    const text = encodeURIComponent('我的 MBTI 壓力影子：'+TYPES[resultType].name);
    window.open(`https://social-plugins.line.me/lineit/share?url=${url}&text=${text}`,'_blank');
  }

  /* ── JS 17：重設 ── */
  function retake() {
    curQ=0; scores={Fe:0,Ti:0,Ne:0,Si:0};
    resultType=null; surveyAnswers=[null,null,null]; sym='🌊';
    document.querySelectorAll('.sym-item').forEach(i=>i.classList.remove('active'));
    document.querySelector('.sym-item:first-child').classList.add('active');
    showScreen('screen-welcome');
  }

  /* ── JS 18：工具函式 ── */
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0,0);
  }

  async function track(event, data={}) {
    try {
      await fetch(CFG.trackerUrl, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ quiz:CFG.quizId, event, sym, ...data, ts:Date.now() })
      });
    } catch(e){}
  }
  </script>
